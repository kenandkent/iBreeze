version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ibreeze
      POSTGRES_USER: ibreeze
      POSTGRES_PASSWORD: ibreeze_password
    ports:
      - "51543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build: ./apps/backend-api
    ports:
      - "51080:51080"
    environment:
      IBREEZE_DATABASE_URL: postgresql+asyncpg://ibreeze:ibreeze_password@postgres:5432/ibreeze
      IBREEZE_API_PORT: "51080"
    depends_on:
      - postgres

volumes:
  postgres_data:
