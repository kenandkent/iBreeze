version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ibreeze
      POSTGRES_USER: ibreeze
      POSTGRES_PASSWORD: ibreeze_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build: ./apps/backend-api
    ports:
      - "8000:8000"
    environment:
      IBREEZE_DATABASE_URL: postgresql+asyncpg://ibreeze:ibreeze_password@postgres:5432/ibreeze
    depends_on:
      - postgres

volumes:
  postgres_data:
